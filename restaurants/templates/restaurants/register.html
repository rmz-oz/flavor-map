{% extends 'restaurants/base.html' %}
{% load crispy_forms_tags %}

{% block title %}Create Account{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
      <div class="fm-card p-4 p-lg-5">
        <div class="text-center mb-4">
          <div style="font-size:3rem;">🍽️</div>
          <h2 class="fw-800 mt-2 mb-1">Join FlavorMap</h2>
          <p class="text-muted">Discover, review, and save your favourite restaurants.</p>
        </div>

        <form method="post" novalidate>
          {% csrf_token %}
          {{ form|crispy }}
          <button type="submit" class="btn btn-primary w-100 btn-lg fw-600 mt-2">
            Create Account
          </button>
        </form>

        <hr class="my-4">
        <p class="text-center mb-0 text-muted">
          Already have an account?
          <a href="{% url 'login' %}" class="fw-600">Log in</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
