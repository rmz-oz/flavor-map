{% extends 'restaurants/base.html' %}
{% block title %}Delete Review{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="fm-card p-5 text-center">
        <div style="font-size:3.5rem;">💬</div>
        <h4 class="fw-800 mt-3 mb-2">Delete this review?</h4>
        <div class="alert alert-secondary text-start my-3">
          <p class="mb-1"><strong>Restaurant:</strong> {{ review.restaurant.name }}</p>
          <p class="mb-1"><strong>Rating:</strong> {{ review.rating }}/5</p>
          <p class="mb-0 small text-muted">{{ review.text|truncatechars:100 }}</p>
        </div>
        <p class="text-muted small">This cannot be undone.</p>
        <form method="post" class="d-flex gap-3 justify-content-center">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger px-4 fw-600">Delete</button>
          <a href="{% url 'restaurant_detail' review.restaurant.pk %}" class="btn btn-outline-secondary px-4">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
