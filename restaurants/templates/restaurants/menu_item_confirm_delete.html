{% extends 'restaurants/base.html' %}
{% block title %}Delete Menu Item{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="fm-card p-5 text-center">
        <div style="font-size:3rem;">🍽️</div>
        <h4 class="fw-800 mt-3 mb-2">Delete Menu Item?</h4>
        <p class="text-muted mb-1">You are deleting:</p>
        <h5 class="text-orange">{{ item.name }}</h5>
        <p class="text-muted small">€{{ item.price }} · {{ item.get_category_display }}</p>
        <form method="post" class="d-flex gap-3 justify-content-center mt-4">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger px-4 fw-600">Delete</button>
          <a href="{% url 'restaurant_detail' item.restaurant.pk %}" class="btn btn-outline-secondary px-4">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
